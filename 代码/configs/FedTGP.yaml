num_repeat_times: 1
distribution: dirichlet
alpha: 0.1

server:
  global_rounds: 50
  lowest_join_rate: 1
  margin_threthold: 100.0
  server_learning_rate: 0.01
  server_epochs: 100
  batch_size: 10

client:
  num_clients: 20
  num_classes_per_client: 2
  batch_size: 64
  local_epochs: 2
  learning_rate: 0.01
  lambda: 1