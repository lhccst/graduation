num_repeat_times: 3
distribution: "dirichlet" # "iid", "non-balanced" or "dirichlet"
alpha: 0.1

server:
  global_rounds: 50
  lowest_join_rate: 0.6
  learning_rate: 0.01
  verbose_gap: 20
  embedding_dim: 100
  hidden_dim: 100

client:
  num_clients: 50
  num_classes_per_client: 2
  batch_size: 64
  learning_rate: 0.01
  hn_lr: 0.005
  local_epochs: 2
